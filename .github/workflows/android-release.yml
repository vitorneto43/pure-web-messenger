name: Build Android Release (AAB + APK)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'aab'
        type: choice
        options:
          - aab
          - apk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: bun install

      - name: Build web app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json criado"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON ausente ou inválido — push notifications desabilitadas"
            rm -f android/app/google-services.json
          fi

      - name: Configure release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'WaveChat2026' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'WaveChat2026' }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
            echo "✅ Keystore fixo carregado do GitHub Secret"
          else
            keytool -genkeypair -v \
              -keystore android/app/keystore.jks \
              -alias "$ANDROID_KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -dname "CN=WaveChat, OU=WaveChat, O=WaveChat, L=Sao Paulo, ST=SP, C=BR"
            base64 -w 0 android/app/keystore.jks > android/app/generated-keystore-base64.txt
            echo "✅ Keystore de upload gerado e AAB será assinado"
          fi

      - name: Upload generated keystore backup
        if: hashFiles('android/app/generated-keystore-base64.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-upload-keystore-backup
          path: android/app/generated-keystore-base64.txt
          retention-days: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == ''
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'WaveChat2026' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'WaveChat2026' }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab'
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'WaveChat2026' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'WaveChat2026' }}
        run: ./gradlew bundleRelease

      - name: Verify AAB signature
        if: github.event.inputs.build_type == 'aab'
        working-directory: android
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab
          echo "✅ AAB verificado: pacote está assinado"

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

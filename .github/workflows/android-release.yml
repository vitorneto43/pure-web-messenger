name: Build Android Release (AAB + APK)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'aab'
        type: choice
        options:
          - aab
          - apk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Detect native push config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
          elif [ -f android/app/google-services.json ] && grep -q '"project_info"' android/app/google-services.json; then
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
            echo "✅ Usando google-services.json do projeto"
          else
            echo "VITE_ENABLE_NATIVE_PUSH=false" >> "$GITHUB_ENV"
            echo "⚠️ GOOGLE_SERVICES_JSON ausente ou inválido — APK será gerado, mas chamadas com app fechado ficam sem push nativo"
          fi

      - name: Build web app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
            echo "✅ google-services.json criado"
          elif [ -f android/app/google-services.json ] && grep -q '"project_info"' android/app/google-services.json; then
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
            echo "✅ google-services.json já existe no projeto"
          else
            echo "VITE_ENABLE_NATIVE_PUSH=false" >> "$GITHUB_ENV"
            echo "⚠️ GOOGLE_SERVICES_JSON ausente ou inválido — seguindo sem google-services.json"
            rm -f android/app/google-services.json
          fi

      - name: Configure release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPECTED_UPLOAD_SHA1: 3F:47:E2:1A:78:C2:FB:C6:E5:4D:6C:50:3D:43:18:90:43:40:EF:DB
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 não está configurado."
            echo "❌ Não vou gerar keystore nova, porque isso muda o SHA-1 e a Play Console rejeita o AAB."
            exit 1
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "❌ ANDROID_KEYSTORE_PASSWORD e ANDROID_KEY_PASSWORD precisam estar configurados."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "✅ Keystore de release carregada"

          ACTUAL_SHA1=$(keytool -list -v -keystore android/app/keystore.jks \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            | awk -F': ' '/SHA1:/{print $2; exit}')

          echo ""
          echo "📋 SHA-1 esperado pela Play Console: $EXPECTED_UPLOAD_SHA1"
          echo "📋 SHA-1 da keystore usada nesta build: $ACTUAL_SHA1"

          if [ "$ACTUAL_SHA1" != "$EXPECTED_UPLOAD_SHA1" ]; then
            echo "❌ Keystore errada: o AAB precisa ser assinado com o SHA-1 $EXPECTED_UPLOAD_SHA1."
            exit 1
          fi

          echo "✅ SHA-1 correto para lançar nova versão"
          keytool -list -v -keystore android/app/keystore.jks \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            | grep -E "SHA1|SHA-256|MD5" || true


      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == ''
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab'
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Verify AAB signature
        if: github.event.inputs.build_type == 'aab'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'wavechat' }}
          EXPECTED_APPLICATION_ID: com.wavechat.app
          EXPECTED_UPLOAD_SHA1: 3F:47:E2:1A:78:C2:FB:C6:E5:4D:6C:50:3D:43:18:90:43:40:EF:DB
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab
          ACTUAL_APPLICATION_ID=$(./gradlew -q :app:properties | awk -F': ' '/applicationId:/{print $2; exit}')
          ACTUAL_SHA1=$(keytool -list -v -keystore app/keystore.jks \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            | awk -F': ' '/SHA1:/{print $2; exit}')

          echo "📋 Package name esperado: $EXPECTED_APPLICATION_ID"
          echo "📋 Package name configurado: $ACTUAL_APPLICATION_ID"
          echo "📋 SHA-1 esperado pela Play Console: $EXPECTED_UPLOAD_SHA1"
          echo "📋 SHA-1 usado para assinar: $ACTUAL_SHA1"

          if [ "$ACTUAL_APPLICATION_ID" != "$EXPECTED_APPLICATION_ID" ]; then
            echo "❌ Package name incorreto. Não publique este AAB."
            exit 1
          fi

          if [ "$ACTUAL_SHA1" != "$EXPECTED_UPLOAD_SHA1" ]; then
            echo "❌ Assinatura incorreta. Não publique este AAB."
            exit 1
          fi

          echo "✅ AAB verificado: package name e assinatura compatíveis com a Play Console"

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

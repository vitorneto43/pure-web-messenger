name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: bun install

      - name: Detect native push config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
          elif [ -f android/app/google-services.json ] && grep -q '"project_info"' android/app/google-services.json; then
            echo "VITE_ENABLE_NATIVE_PUSH=true" >> "$GITHUB_ENV"
            echo "✅ Usando google-services.json do projeto"
          else
            echo "VITE_ENABLE_NATIVE_PUSH=false" >> "$GITHUB_ENV"
            echo "⚠️ GOOGLE_SERVICES_JSON ausente ou inválido — APK será gerado, mas chamadas com app fechado ficam sem push nativo"
          fi

      - name: Build web app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json criado"
          elif [ -f android/app/google-services.json ] && grep -q '"project_info"' android/app/google-services.json; then
            echo "✅ google-services.json já existe no projeto"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON ausente ou inválido — seguindo sem google-services.json"
            rm -f android/app/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wavechat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
